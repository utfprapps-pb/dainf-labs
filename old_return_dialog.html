<div class="bg-white rounded-xl shadow-2xl flex flex-col max-h-[90vh] overflow-hidden">
  <!-- Header Design -->
  <div class="px-6 py-4 flex justify-between items-center border-b border-gray-100 bg-white">
    <div class="flex items-center gap-4">
      <div class="w-12 h-12 rounded-full bg-orange-50 text-orange-400 flex items-center justify-center text-2xl">
        <i class="pi pi-file-edit"></i>
      </div>
      <div>
        <h2 class="text-xl font-bold text-gray-800">Ficha de Empréstimo</h2>
        <p class="text-sm text-gray-500">Visualize os detalhes do empréstimo do aluno</p>
      </div>
    </div>
  </div>

  <div class="p-6 overflow-y-auto custom-scrollbar flex-1 bg-white">
    <!-- 1. Dados Básicos -->
    <div class="bg-gray-50 rounded-lg p-5 mb-8 border border-gray-100">
      <h3 class="text-sm font-bold text-gray-800 mb-4 uppercase tracking-wide border-b border-gray-200 pb-2">1. Dados Básicos</h3>
      <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
        <div>
          <p class="text-xs text-gray-500 font-medium mb-1">Nome</p>
          <p class="text-sm font-bold text-gray-800">{{ loan.borrower.nome }}</p>
        </div>
        <div>
          <p class="text-xs text-gray-500 font-medium mb-1">Curso</p>
          <p class="text-sm font-bold text-gray-800">Engenharia Elétrica</p>
        </div>
        <div>
          <p class="text-xs text-gray-500 fon
                    <span class="px-2 text-xs w-8 text-center font-bold border-x border-gray-300">
                      {{ item.tempReturnQty || 0 }}
                    </span>
                    <button class="px-2 text-gray-500 hover:bg-gray-100 font-bold" (click)="incrementReturn(item)">+</button>
                  </div>
                </td>
                <td class="px-5 py-3 text-center">
                  <span class="text-[10px] font-bold px-2 py-0.5 rounded-md" 
                    [ngClass]="loan.status === 'OVERDUE' ? 'bg-red-100 text-red-600 border border-red-200' : 'bg-green-100 text-green-700 border border-green-200'">
                    {{ loan.status === 'OVERDUE' ? 'Atrasado' : 'Ativo' }}
                  </span>
                </td>
              </tr>
            }
          </tbody>
        </table>
      </div>
    }
  </div>

  <!-- Footer Design -->
  <div class="border-t border-gray-200 px-6 py-4 bg-gray-50 flex items-center justify-between">
    <button (click)="cancel()" class="px-6 py-2 bg-white border border-gray-300 rounded-md text-sm font-semibold text-gray-700 hover:bg-gray-100 shadow-sm transition-colors">Fechar</button>
    <div class="flex items-center gap-4">
      <button (click)="markAllReturned()" class="px-4 py-2 border border-blue-200 text-blue-600 bg-blue-50 hover:bg-blue-100 rounded-md text-sm font-semibold shadow-sm transition-colors flex items-center gap-2">
        <i class="pi pi-check"></i> Marcar todos como devolvidos
      </button>
      <button (click)="save()" class="px-6 py-2 bg-[#22C55E] hover:bg-green-600 text-white rounded-md text-sm font-semibold shadow-sm transition-colors">
        Confirmar devolução
      </button>
    </div>
  </div>
</div>
