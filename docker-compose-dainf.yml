services:
  labs-client:
    image: ${CLIENT_IMAGE_NAME}
    container_name: ${CLIENT_CONTAINER_NAME}
    build:
      context: ./dainf-lab-client
      dockerfile: Dockerfile
    ports:
      - "${CLIENT_HOST_PORT}:${CLIENT_CONTAINER_PORT}"
    environment:
      API_URL: ${API_URL}
    labels:
        # Traefik Config
      - "traefik.enable=true"
      - "traefik.http.routers.${CLIENT_CONTAINER_NAME}.rule=Host(`${CLIENT_HOST_URL}`)"
      - "traefik.http.routers.${CLIENT_CONTAINER_NAME}.tls.certresolver=letsencrypt"
      - "traefik.http.routers.${CLIENT_CONTAINER_NAME}.entrypoints=websecure"
    restart: unless-stopped
    profiles: ["app"]
    networks:
      - web

  labs-api:
    image: ${API_IMAGE_NAME}
    container_name: ${API_CONTAINER_NAME}
    build:
      context: ./dainf-lab-server
      dockerfile: Dockerfile
    ports:
      - "${API_HOST_PORT}:${API_CONTAINER_PORT}"
    restart: unless-stopped
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE}
      - COMPOSE_PROJECT_NAME=${API_CONTAINER_NAME}
      - SERVER_PORT=${API_CONTAINER_PORT}
      - DATABASE_URL=${DATABASE_URL}
      - DATABASE_USERNAME=${DATABASE_USERNAME}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD}
      - MAIL_HOST=${MAIL_HOST}
      - MAIL_PORT=${MAIL_PORT}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - MINIO_URL=${MINIO_URL}
      - MINIO_BUCKET=${MINIO_BUCKET}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}      
      - MINIO_PORT=${MINIO_PORT}
      - MINIO_SECURE=${MINIO_SECURE}
      - BASE_URL=${BASE_URL}
      - TZ=America/Sao_Paulo
    labels:
        # Traefik Config
      - "traefik.enable=true"
      - "traefik.http.routers.${API_CONTAINER_NAME}.rule=Host(`${API_HOST_URL}`)"
      - "traefik.http.routers.${API_CONTAINER_NAME}.tls.certresolver=letsencrypt"
      - "traefik.http.routers.${API_CONTAINER_NAME}.entrypoints=websecure"
    profiles: ["app"]
    networks:
      - web
      - database
########################### NETWORKS
networks:
  web:
    name: web
    driver: bridge
    external: true
    attachable: true
  database:
    name: database
    driver: bridge
    external: false
    attachable: true
