<div class="p-4">
  <app-input-container label="Mutuário" class="mb-4 block">
    <app-search-select
      [(ngModel)]="selectedBorrower"
      (ngModelChange)="onBorrowerChange($event)"
      optionLabel="nome"
      [service]="userService"
      placeholder="Selecione um usuário"
    />
  </app-input-container>

  @if (searched) {
    <p-table [value]="pendingItems" [rows]="5" [paginator]="true" responsiveLayout="scroll" autoLayout="true">
      <ng-template pTemplate="header">
        <tr>
          <th>Item</th>
          <th>Quantidade Pendente</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-pendingItem>
        <tr>
          <td>{{ pendingItem.itemName }}</td>
          <td>{{ pendingItem.pendingQuantity }}</td>
        </tr>
      </ng-template>
      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="2">Nenhuma pendência encontrada para este usuário.</td>
        </tr>
      </ng-template>
    </p-table>
  }

  <div class="flex justify-end gap-2 mt-4">
    <p-button label="Fechar" icon="pi pi-times" styleClass="p-button-secondary" (click)="closeDialog()"></p-button>
  </div>
</div>
