<div class="card">
  <div class="font-semibold text-2xl mb-4">Configurações</div>

  <form [formGroup]="form" class="grid grid-cols-12 gap-4">
    <app-input-container
      label="E-mail para envio do nada consta"
      class="col-span-12 md:col-span-6 lg:col-span-3"
    >
      <input
        type="text"
        pInputText
        id="clearanceEmailRecipient"
        formControlName="clearanceEmailRecipient"
        fluid
      />
    </app-input-container>

    <div class="col-span-12 flex flex-col gap-2">
      <label class="font-medium" for="useMinimumStockValidator">
        Validar estoque mínimo nas operações
      </label>
      <div class="flex items-center gap-3">
        <p-toggleswitch
          inputId="useMinimumStockValidator"
          formControlName="useMinimumStockValidator"
        />
        <span class="text-sm text-color-secondary">
          Quando ativado, operações de saída não poderão reduzir o estoque abaixo do mínimo definido para cada item.
        </span>
      </div>
    </div>
  </form>

  <div class="flex justify-end mt-4">
    <button
      pButton
      type="button"
      label="Salvar"
      icon="pi pi-check"
      class="p-button-success"
      (click)="save()"
    ></button>
  </div>
</div>
