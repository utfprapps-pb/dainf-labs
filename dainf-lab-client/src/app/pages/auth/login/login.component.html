<app-floating-configurator />
<div
  class="bg-surface-50 dark:bg-surface-950 flex items-center justify-center min-h-screen min-w-screen overflow-hidden">
  <div class="flex flex-col items-center justify-center">
    <div>
      <div class="w-full bg-surface-0 dark:bg-surface-900 py-20 px-8 sm:px-20 border-t-3 border-t-primary" style="border-radius: 53px">
        <div class="text-center mb-8">
          <div class="mb-8 flex justify-center align-middle">
            <app-logo width="16rem" />
          </div>
          <div class="text-surface-900 dark:text-surface-0 text-3xl font-medium mb-4">Sala de Apoio – DAINF/UTFPR</div>
          <span class="text-muted-color font-medium">Faça login para continuar</span>
        </div>

        <div>
          <label for="email1" class="block text-surface-900 dark:text-surface-0 text-xl font-medium mb-2">E-mail</label>
          <input pInputText id="email1" type="text" placeholder="Endereço de e-mail" class="w-full md:w-120 mb-8"
            [(ngModel)]="email" />

          <label for="password1"
            class="block text-surface-900 dark:text-surface-0 font-medium text-xl mb-2">Senha</label>
          <p-password id="password1" [(ngModel)]="password" placeholder="Senha" [toggleMask]="true" styleClass="mb-4"
            [fluid]="true" [feedback]="false"></p-password>

          <div class="flex items-center justify-between mt-2 mb-8 gap-8">
            <div class="flex items-center">
              <p-checkbox [(ngModel)]="rememberMe" id="rememberme1" binary class="mr-2"></p-checkbox>
              <label for="rememberme1">Continuar conectado</label>
            </div>
            <a routerLink="/forgot-password" class="font-medium no-underline ml-2 text-right cursor-pointer text-primary">Esqueceu a senha?</a>
          </div>
          <p-button label="Entrar" styleClass="w-full" (onClick)="loginClick()"></p-button>

          @if (emailNotConfirmed()) {
            <div class="mt-6 p-4 rounded-lg border border-orange-300 dark:border-orange-700 bg-orange-50 dark:bg-orange-950 flex gap-3">
              <i class="pi pi-envelope text-orange-500 text-xl mt-0.5 shrink-0"></i>
              <div>
                <p class="font-semibold text-orange-800 dark:text-orange-200 m-0 mb-1">E-mail não confirmado</p>
                <p class="text-sm text-orange-700 dark:text-orange-300 m-0 mb-3">
                  Confirme seu e-mail antes de acessar o sistema. Verifique sua caixa de entrada.
                </p>
                <p-button
                  label="Reenviar e-mail de confirmação"
                  icon="pi pi-refresh"
                  [link]="true"
                  [loading]="resending()"
                  (onClick)="resendConfirmation()"
                  styleClass="p-0 text-orange-600 dark:text-orange-400 hover:text-orange-800"
                />
              </div>
            </div>
          }

          <div class="text-center mt-8">
            <span>Não possui cadastro? <a routerLink="/sign-up" class="text-primary">Cadastre-se</a></span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
